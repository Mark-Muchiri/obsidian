<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%">

  <defs>
    <!-- Kept exact colors, slightly enhanced visibility -->
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a7a82" />
      <stop offset="50%" stop-color="#1a4a54" />
      <stop offset="100%" stop-color="#0a7a82" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#070709" />
      <stop offset="100%" stop-color="#0d0d12" />
    </linearGradient>
  </defs>

  <style>
    .background-rect {
      fill: url(#bgGradient);
    }

    /* Border opacity scaled up by 0.5x (0.35 -> 0.53) and glow enhanced */
    .border-path {
      stroke: url(#cyberGradient);
      stroke-width: 1.2;
      stroke-opacity: 0.53;
      fill: none;
      filter: drop-shadow(0 0 4px rgba(10, 122, 130, 0.3));
    }

    /* Retained the exact hex color, increased baseline glow */
    .ascii {
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      fill: #0fa0ab; 
      white-space: pre;
      text-anchor: middle;
    }

    /* 
      Keyframes scaled up by 1.5x brightness. 
      Peaks adjusted from 0.75 up to 0.98, and drop-shadow alphas multiplied by 1.5.
    */
    @keyframes unstablePower {
      0%, 11% { opacity: 0.98; filter: drop-shadow(0 0 6px rgba(15, 160, 171, 0.6)); }
      12% { opacity: 0.22; filter: drop-shadow(0 0 0px transparent); }
      13% { opacity: 0.90; }
      14% { opacity: 0.08; }
      15%, 34% { opacity: 0.95; filter: drop-shadow(0 0 5px rgba(15, 160, 171, 0.45)); }
      35% { opacity: 0.45; }
      36%, 41% { opacity: 0.30; filter: drop-shadow(0 0 2px rgba(15, 160, 171, 0.15)); }
      42% { opacity: 0.98; }
      43% { opacity: 0.12; }
      44%, 62% { opacity: 0.98; filter: drop-shadow(0 0 6px rgba(15, 160, 171, 0.6)); }
      63% { opacity: 0.0; }  
      64% { opacity: 0.75; }
      65% { opacity: 0.0; }
      66%, 81% { opacity: 0.95; filter: drop-shadow(0 0 5px rgba(15, 160, 171, 0.45)); }
      82% { opacity: 0.38; }
      83% { opacity: 0.98; }
      84% { opacity: 0.18; }
      85%, 100% { opacity: 0.98; filter: drop-shadow(0 0 6px rgba(15, 160, 171, 0.6)); }
    }

    /* Indicator light opacity scaled up by 1.5x (0.6 -> 0.9) */
    @keyframes indicatorFlicker {
      0%, 24% { fill-opacity: 0.9; filter: drop-shadow(0 0 3px rgba(15, 160, 171, 0.75)); }
      25% { fill-opacity: 0.15; filter: none; }
      26% { fill-opacity: 0.75; }
      55%, 89% { fill-opacity: 0.9; filter: drop-shadow(0 0 3px rgba(15, 160, 171, 0.75)); }
      90% { fill-opacity: 0.0; filter: none; }
      92% { fill-opacity: 0.6; }
    }

    .animated-text {
      animation: unstablePower 4.7s infinite linear;
    }

    .power-dot {
      fill: #0fa0ab;
      animation: indicatorFlicker 3.1s infinite linear;
    }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" class="background-rect" />

  <!-- Framing Linework -->
  <path d="M 20,20 L 780,20 L 780,160 L 20,160 Z M 15,15 L 785,15 L 785,165 L 15,165 Z" class="border-path" />
  <path d="M 45,5 L 5,45" class="border-path" />
  <path d="M 755,5 L 795,45" class="border-path" />
  <path d="M 45,175 L 5,135" class="border-path" />
  <path d="M 755,175 L 795,135" class="border-path" />
  
  <!-- Power Indicator -->
  <circle cx="765" cy="35" r="3" class="power-dot" />

  <!-- Main ASCII Graphic -->
  <text x="50%" y="35" class="ascii animated-text">
    <tspan x="50%" dy="1.2em">   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—</tspan>
    <tspan x="50%" dy="1.2em">  в–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘</tspan>
    <tspan x="50%" dy="1.2em">  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘</tspan>
    <tspan x="50%" dy="1.2em">  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘</tspan>
    <tspan x="50%" dy="1.2em">  в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘</tspan>
    <tspan x="50%" dy="1.2em">   в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•җв•җв•қ</tspan>
  </text>

</svg>
